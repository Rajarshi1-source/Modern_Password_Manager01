apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: password-manager
  labels:
    app: password-manager
    component: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        # Add slack_configs, pagerduty_configs, email_configs, or webhook_configs here.

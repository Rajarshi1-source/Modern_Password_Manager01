apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: password-manager
  labels:
    app: password-manager
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [password-manager]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
  alerts.yml: |
    groups:
      - name: password-manager
        rules:
          # Requires kube-state-metrics if you enable the kube-state-metrics scrape below.
          # - alert: BackendDeploymentReplicasMismatch
          #   expr: kube_deployment_spec_replicas{namespace="password-manager"} != kube_deployment_status_replicas_available{namespace="password-manager"}
          - alert: PrometheusScrapeDown
            expr: up{job="kubernetes-pods"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Metrics scrape target down
              description: A pod that exposes /metrics is not responding to Prometheus (check pod, NetworkPolicy, or annotations).

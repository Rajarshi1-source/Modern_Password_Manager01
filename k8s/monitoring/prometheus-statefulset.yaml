apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: password-manager
  labels:
    app: password-manager
    component: prometheus
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  selector:
    app: password-manager
    component: prometheus
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: password-manager
  labels:
    app: password-manager
    component: prometheus
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app: password-manager
      component: prometheus
  template:
    metadata:
      labels:
        app: password-manager
        component: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # Prometheus writes TSDB and may use temp files
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: prometheus-config
                  items:
                    - key: prometheus.yml
                      path: prometheus.yml
                    - key: alerts.yml
                      path: rules/alerts.yml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

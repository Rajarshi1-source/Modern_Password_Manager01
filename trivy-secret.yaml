# Trivy secret-scanning configuration.
#
# Auto-loaded by Trivy from the scan root: the default value of `--secret-config`
# is `trivy-secret.yaml`, so both the filesystem scan
# (`.github/workflows/security-multi-scanner.yml`) and the image scan
# (`.github/workflows/ci.yml`, which also loads `trivy.yaml`) pick this up.
#
# Purpose: do NOT secret-scan THIRD-PARTY example/test keys that are vendored
# inside installed Python packages under `site-packages`. The motivating case is
# autobahn's `wamp/cryptosign.py` Ed25519 docstring key, which Trivy's built-in
# `private-key` rule reports as "Asymmetric Private Key" (alerts #1559 the .pyc /
# #1560 the .py). That key is documentation, not a real secret, and the runtime
# image already strips `autobahn/wamp` in `docker/backend/Dockerfile` — this rule
# is defense-in-depth for any filesystem/venv scan that sees an un-stripped venv.
#
# Scope is deliberately narrow: only paths under `site-packages` are excluded, so
# any FIRST-PARTY private key committed to the repo (never under site-packages)
# is still detected. This replaces the former no-op `.trivyignore` entry
# `autobahn-wamp-example-key`, which never matched (Trivy's secret rule id is
# `private-key`, not that custom string).
allow-rules:
  - id: vendored-site-packages-private-key
    description: Third-party example/test keys bundled in installed Python packages
    path: (.*/)?site-packages/.*

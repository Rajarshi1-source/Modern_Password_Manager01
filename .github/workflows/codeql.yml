name: CodeQL Analysis

# =============================================================================
# CodeQL Advanced Setup
#
# Language notes
# ──────────────
# Python + JavaScript/TypeScript: interpreted → build-mode: none works fine.
#
# Java/Kotlin (android module) and Swift (iOS module) are both library-only
# Expo native modules that depend on expo-modules-core and require the full
# React Native host project to compile.  They cannot be built in isolation,
# so they are intentionally excluded from CodeQL to avoid fatal build errors.
#
# Ruby: not present in this repository → excluded.
# =============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Disable GitHub's default CodeQL setup so the advanced workflow below can
  # upload SARIF results without being rejected.
  #
  # If this job fails with HTTP 403 the GITHUB_TOKEN lacks the required
  # permission.  In that case disable default setup manually once:
  #   Repository → Settings → Code security → Code scanning
  #   → "Switch to advanced" (or disable the default setup toggle).
  # After that one-time action this job becomes a no-op.
  # ---------------------------------------------------------------------------
  disable-default-setup:
    name: Disable default CodeQL setup
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Disable and verify default setup is off
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disabling default CodeQL setup..."
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/code-scanning/default-setup \
            -f state=not-configured

          echo "Verifying the change took effect..."
          state=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/code-scanning/default-setup \
            --jq '.state')
          echo "Current default-setup state: $state"

          if [ "$state" = "configured" ]; then
            echo "::error title=Action Required::Default setup is still enabled after the API call."
            echo "::error::Disable it manually at: https://github.com/${{ github.repository }}/settings/security_analysis"
            echo "::error::Under 'Code scanning' click 'Switch to advanced setup' then re-run this workflow."
            exit 1
          fi

          echo "Default setup is $state – advanced analysis can proceed."

  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: disable-default-setup

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: /language:${{ matrix.language }}

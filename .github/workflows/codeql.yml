name: CodeQL Analysis

# =============================================================================
# CodeQL Advanced Setup
#
# Language notes
# ──────────────
# Python + JavaScript/TypeScript: interpreted → build-mode: none works fine.
#
# Java/Kotlin (android module) and Swift (iOS module) are both library-only
# Expo native modules that depend on expo-modules-core and require the full
# React Native host project to compile.  They cannot be built in isolation,
# so they are intentionally excluded from CodeQL to avoid fatal build errors.
#
# Ruby: not present in this repository → excluded.
# =============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: /language:${{ matrix.language }}

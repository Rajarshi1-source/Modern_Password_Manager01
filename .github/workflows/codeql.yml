name: CodeQL Analysis

# =============================================================================
# CodeQL Advanced Setup
#
# Language notes
# ──────────────
# Python + JavaScript/TypeScript: interpreted → build-mode: none works fine.
#
# Java/Kotlin (android module) and Swift (iOS module) are both library-only
# Expo native modules that depend on expo-modules-core and require the full
# React Native host project to compile.  They cannot be built in isolation,
# so they are intentionally excluded from CodeQL to avoid fatal build errors.
#
# Ruby: not present in this repository → excluded.
# =============================================================================

on:
  push:
    branches: [main, develop]
  # NOTE: `pull_request` trigger intentionally omitted while GitHub's
  # default CodeQL setup is enabled at the repo level. The default
  # setup already runs CodeQL on every PR (its result appears under
  # the same "Analyze (python)" / "Analyze (javascript-typescript)"
  # check names), and any attempt by THIS advanced workflow to also
  # upload SARIF on a PR fails with:
  #
  #     "CodeQL analyses from advanced configurations cannot be
  #      processed when the default setup is enabled"
  #
  # The result was two identically-named check rows per PR — one
  # PASS (default setup) and one FAIL (this workflow's structural
  # conflict). That blocked every PR's required-checks gate.
  #
  # Once the repo owner flips Settings → Code security → Code
  # scanning → "Switch to advanced" (disabling the default setup),
  # restore the pull_request trigger below to get PR-time coverage
  # from this workflow's custom paths-ignore config.
  #
  # pull_request:
  #   branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Note: GitHub's default CodeQL setup must be disabled once at the repo
  # level so this advanced workflow can upload SARIF results without being
  # rejected. This is a one-time manual action — the GITHUB_TOKEN does not
  # carry permission to flip the toggle via the REST API on org-owned repos:
  #
  #   Repository → Settings → Code security → Code scanning
  #   → "Switch to advanced" (or disable the default setup toggle).
  #
  # The previous "disable-default-setup" job that attempted this via
  # `gh api` was removed because it failed with HTTP 403 on every run.
  # ---------------------------------------------------------------------------
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # See .github/codeql/codeql-config.yml for the rationale on
          # the (narrow) paths-ignore list — protocol-mandated SHA-1
          # in HIBP files and a pytest orchestrator shim.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: /language:${{ matrix.language }}

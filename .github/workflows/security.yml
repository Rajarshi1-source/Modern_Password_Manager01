name: Security & Supply Chain Audit

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 1"  # weekly

jobs:
  security:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install pip-audit "safety==2.3.5" "cyclonedx-bom>=1.4.3,<2"

      - name: Dependency install (prod)
        run: |
          cd password_manager
          pip install \
            -r requirements-prod.txt \
            -c requirements-constraints.txt

      - name: pip-audit
        run: |
          pip-audit || true

      - name: safety scan
        run: |
          safety check --full-report || true

      - name: SBOM generation
        run: |
          cyclonedx-py requirements -r password_manager/requirements-prod.txt --format json -o sbom.json

      - name: Verify SBOM exists
        run: |
          if [ ! -f sbom.json ]; then
            echo "ERROR: sbom.json not found — SBOM generation failed" >&2
            exit 1
          fi
          echo "SBOM generated successfully ($(wc -c < sbom.json) bytes)"

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

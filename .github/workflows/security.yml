name: Security & Supply Chain Audit

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 1"  # weekly

jobs:
  security:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install "safety==2.3.5" "cyclonedx-bom>=1.4.3,<2"

      - name: Dependency install (prod)
        run: |
          cd password_manager
          pip install \
            -r requirements-prod.txt \
            -c requirements-constraints.txt

      - name: pip-audit
        run: |
          pip-audit || true

      - name: safety scan
        run: |
          safety check --full-report || true

      - name: SBOM generation
        run: |
          cyclonedx-py -r -i password_manager/requirements-prod.txt --format json -o sbom.json

      - name: Verify SBOM exists
        run: |
          if [ ! -f sbom.json ]; then
            echo "ERROR: sbom.json not found — SBOM generation failed" >&2
            exit 1
          fi
          echo "SBOM generated successfully ($(wc -c < sbom.json) bytes)"

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

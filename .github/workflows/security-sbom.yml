name: Security SBOM & Supply Chain Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write   # required for cosign keyless signing

jobs:
  sbom:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'

      - name: Install SBOM tools
        run: |
          pip install --upgrade pip
          pip install "cyclonedx-bom>=1.4.3,<2" pip-audit

      - name: Install CycloneDX CLI
        run: |
          curl -sL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.25.0/cyclonedx-linux-x64" -o cyclonedx-cli
          chmod +x cyclonedx-cli
          sudo mv cyclonedx-cli /usr/local/bin/

      - name: Check requirements file
        run: |
          ls -la password_manager || true
          test -f password_manager/requirements.txt || (echo "requirements.txt not found" && exit 1)

      - name: CycloneDX CLI version / help
        run: |
          cyclonedx-py --version || true
          cyclonedx-py --help || true

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py -r -i password_manager/requirements.txt --format json -o sbom.json

      - name: Verify SBOM exists
        run: |
          if [ ! -f sbom.json ]; then
            echo "ERROR: sbom.json not found — SBOM generation failed" >&2
            exit 1
          fi
          echo "SBOM generated successfully ($(wc -c < sbom.json) bytes)"

      - name: Validate SBOM
        run: |
          cyclonedx-cli validate --input-file sbom.json

      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

name: Security SBOM & Supply Chain Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write   # required for cosign keyless signing

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'

      - name: Install SBOM tools
        run: |
          pip install --upgrade pip
          pip install cyclonedx-bom pip-audit

      - name: Install CycloneDX CLI
        run: |
          curl -sL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.25.0/cyclonedx-linux-x64" -o cyclonedx-cli
          chmod +x cyclonedx-cli
          sudo mv cyclonedx-cli /usr/local/bin/

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment > sbom.json

      - name: Validate SBOM
        run: |
          cyclonedx-cli validate --input-file sbom.json

      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

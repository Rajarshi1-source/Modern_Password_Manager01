name: CI â€” build, SBOM, sign, attest

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for cosign keyless OIDC
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lowercase IMAGE
        run: |
          echo "IMAGE=${IMAGE,,}" >> ${GITHUB_ENV}

      # The deps-builder Docker stage installs a large set of ML/AI
      # dependencies (tensorflow, torch, dlib, mediapipe, scipy, etc.).
      # GitHub-hosted runners only ship with ~14 GB free disk, which has
      # caused "No space left on device" failures during pip install.
      # Reclaim space from preinstalled toolchains we don't use here.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to registry (GHCR)
        # Only needed when we actually publish (push to main). PR runs build
        # the image locally and never touch the registry.
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push to GHCR only on main)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/backend/Dockerfile
          # Publish to GHCR only on push to main. On PRs, load the image into
          # the local Docker daemon instead: this still validates the Dockerfile
          # and lets Syft scan the image for the SBOM, but avoids the flaky
          # multi-GB registry push that times out on PR runs
          # (failed to authorize: DeadlineExceeded).
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64

      - name: Install Syft (Anchore)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.0.1
          syft version

      - name: Generate SBOM (CycloneDX and SPDX) from image
        # GHCR is eventually consistent for manifest reads. The push above
        # can complete (build action reports "DONE") while a follow-up
        # ``manifest GET`` against the same tag still returns 404
        # MANIFEST_UNKNOWN for a brief window. We retry the Syft scan a
        # few times with a short backoff rather than fail the whole
        # build on a transient consistency hit.
        run: |
          attempts=0
          max_attempts=5
          backoff=10
          while : ; do
            attempts=$((attempts + 1))
            if syft ${{ env.IMAGE }} -o cyclonedx-json=sbom.image.cyclonedx.json \
              && syft ${{ env.IMAGE }} -o spdx-json=sbom.image.spdx.json; then
              break
            fi
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "ERROR: Syft could not resolve ${{ env.IMAGE }} after $max_attempts attempts" >&2
              exit 1
            fi
            echo "Syft attempt $attempts/$max_attempts failed; retrying in ${backoff}s..." >&2
            sleep "$backoff"
            backoff=$((backoff * 2))
          done
          ls -lh sbom.image.*

      - name: (Optional) Generate SBOM for python env (cyclonedx-py)
        run: |
          python -m pip install "cyclonedx-bom>=1.4.3,<2"
          cyclonedx-py -r -i password_manager/requirements-prod.txt > sbom.python.cyclonedx.json || true
        continue-on-error: true



      - name: Push SBOM as OCI artifact (ORAS)
        # Attaching to the pushed manifest only makes sense when we published it.
        if: github.event_name == 'push'
        run: |
          curl -sSfL https://github.com/oras-project/oras/releases/download/v1.1.0/oras_1.1.0_linux_amd64.tar.gz | tar -xz
          sudo mv oras /usr/local/bin/oras
          oras version
          oras attach ${{ env.IMAGE }} sbom.image.cyclonedx.json --artifact-type application/vnd.cyclonedx+json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOM with cosign (keyless)
        # Provenance signing is for published images only; skip on PRs.
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Newer cosign defaults to the new bundle format and requires
          # ``--bundle`` (the legacy ``--output-signature`` is ignored and
          # leaves the bundle path empty, which fails with "create bundle
          # file: open : no such file or directory").
          cosign sign-blob --yes \
            --bundle sbom.image.cyclonedx.bundle.json \
            sbom.image.cyclonedx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.image.cyclonedx.json
            sbom.image.spdx.json
            sbom.python.cyclonedx.json
            sbom.image.cyclonedx.bundle.json

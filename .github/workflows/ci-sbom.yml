name: CI â€” build, SBOM, sign, attest

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for cosign keyless OIDC
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lowercase IMAGE
        run: |
          echo "IMAGE=${IMAGE,,}" >> ${GITHUB_ENV}

      # FIX: Update to v3 for Docker API 1.44+ support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to registry (GHCR)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64

      - name: Install Syft (Anchore)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.0.1
          syft version

      - name: Generate SBOM (CycloneDX and SPDX) from image
        run: |
          syft ${{ env.IMAGE }} -o cyclonedx-json=sbom.image.cyclonedx.json
          syft ${{ env.IMAGE }} -o spdx-json=sbom.image.spdx.json
          ls -lh sbom.image.*

      - name: (Optional) Generate SBOM for python env (cyclonedx-py)
        run: |
          python -m pip install "cyclonedx-bom>=1.4.3,<2"
          cyclonedx-py -r -i password_manager/requirements-prod.txt > sbom.python.cyclonedx.json || true
        continue-on-error: true



      - name: Push SBOM as OCI artifact (ORAS)
        run: |
          curl -sSfL https://github.com/oras-project/oras/releases/download/v1.1.0/oras_1.1.0_linux_amd64.tar.gz | tar -xz
          sudo mv oras /usr/local/bin/oras
          oras version
          oras attach ${{ env.IMAGE }} sbom.image.cyclonedx.json --artifact-type application/vnd.cyclonedx+json

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign SBOM with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.sig \
            sbom.image.cyclonedx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.image.cyclonedx.json
            sbom.image.spdx.json
            sbom.python.cyclonedx.json

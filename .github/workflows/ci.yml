# =============================================================================
# GitHub Actions CI/CD Pipeline - Password Manager
# =============================================================================
# Complete CI/CD pipeline for:
# - Testing (Backend + Frontend)
# - Building Docker images
# - Deploying to staging/production
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===========================================================================
  # Compute lowercase image names
  # ===========================================================================
  # OCI image references must be lowercase. ${{ github.repository }} preserves
  # the GitHub-stored casing (which can include uppercase letters and `_`),
  # producing references that fail to parse in strict clients like Trivy.
  # This job emits lowercase image names that all downstream jobs consume.
  setup:
    name: Compute image names
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.names.outputs.backend }}
      frontend_image: ${{ steps.names.outputs.frontend }}
    steps:
      - id: names
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repo_lc}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${repo_lc}/frontend" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Backend Tests
  # ===========================================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          # enable universe (libgl packages sometimes live there)
          sudo apt-get install -y software-properties-common || true
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          
          # Required build deps (must be installed)
          sudo apt-get install -y python3-dev build-essential || true
          
          # Optional system deps: try to install, but don't fail CI if not available
          sudo apt-get install -y libgl1-mesa-glx || echo "libgl1-mesa-glx not available, skipping"
          sudo apt-get install -y liboqs-dev || echo "liboqs-dev not available, skipping"
          
          cd password_manager
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8 black isort "safety==2.3.5" bandit
      
      - name: Run linting
        run: |
          cd password_manager
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Check code formatting
        run: |
          cd password_manager
          black --check --diff . || true
          isort --check-only --diff . || true
      
      - name: Security check
        run: |
          cd password_manager
          safety check -r requirements.txt || true
          bandit -r . -x tests,venv --severity-level medium || true
      
      - name: Wait for Postgres and Redis
        run: |
          echo "Export PG env vars and DATABASE_URL..."
          export PGHOST=127.0.0.1
          export PGPORT=5432
          export PGUSER=test_user
          export PGPASSWORD=test_password
          export PGDATABASE=test_db
          export DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
          echo "Waiting for Postgres..."
          for i in {1..60}; do
            if pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" >/dev/null 2>&1; then
              echo "Postgres is ready"; break
            fi
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in {1..60}; do
            if redis-cli -h 127.0.0.1 ping >/dev/null 2>&1; then
              echo "Redis is ready"; break
            fi
            sleep 1
          done
        shell: bash

      - name: Run migrations
        env:
          DEBUG: 'True'
          SECRET_KEY: 'test-secret-key-for-ci'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          REDIS_URL: redis://127.0.0.1:6379/0
          USE_REDIS_CACHE: 'True'
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: test_user
          PGPASSWORD: test_password
          PGDATABASE: test_db
          DATABASE_URL: postgresql://test_user:test_password@127.0.0.1:5432/test_db
        run: |
          cd password_manager
          python manage.py migrate --noinput
      
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: password_manager.settings
          DEBUG: 'True'
          SECRET_KEY: 'test-secret-key-for-ci'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          REDIS_URL: redis://127.0.0.1:6379/0
          USE_REDIS_CACHE: 'True'
          CELERY_BROKER_URL: redis://127.0.0.1:6379/1
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: test_user
          PGPASSWORD: test_password
          PGDATABASE: test_db
          DATABASE_URL: postgresql://test_user:test_password@127.0.0.1:5432/test_db
          # Feature flags: keep enabled so the new apps' URL patterns + tests
          # are exercised in CI.
          CIRCADIAN_TOTP_ENABLED: 'True'
          DECENTRALIZED_IDENTITY_ENABLED: 'True'
          # Security feature flags introduced with the "Smart Contract
          # Automation / Honeypot Passwords / Self-Destructing
          # Passwords" rollout. Kept enabled so their URL patterns and
          # tests run; the on-chain bridge is short-circuited by an
          # empty VAULT_AUDIT_LOG_ADDRESS.
          SMART_CONTRACT_UNLOCK_ONCHAIN_ENABLED: 'True'
          VAULT_AUDIT_LOG_ADDRESS: ''
          HONEYPOT_CREDENTIALS_ENABLED: 'True'
          HONEYPOT_DEFAULT_CHANNELS: 'email'
          SELF_DESTRUCT_PASSWORDS_ENABLED: 'True'
          SELF_DESTRUCT_SWEEP_INTERVAL_MINUTES: '5'
          # Ultrasonic device pairing + Heartbeat/HRV authentication.
          # Kept enabled so URL patterns and backend tests exercise
          # the full code path. The audio/camera capture paths are
          # exercised only in the frontend smoke suite.
          ULTRASONIC_PAIRING_ENABLED: 'True'
          PAIRING_SESSION_TTL_SECONDS: '120'
          HEARTBEAT_AUTH_ENABLED: 'True'
          HEARTBEAT_DURESS_ENABLED: 'True'
          DID_ISSUER_DID: 'did:web:test.securevault.local'
          IPFS_PROVIDER: 'pinata'
          VC_CHAIN_ANCHOR_ENABLED: 'False'
          # Placeholder provider credentials (empty in CI so real network
          # calls are short-circuited by the adapters).
          PINATA_JWT: ''
          WEB3_STORAGE_TOKEN: ''
          ARWEAVE_WALLET_JSON: ''
          FITBIT_CLIENT_ID: ''
          FITBIT_CLIENT_SECRET: ''
          FITBIT_REDIRECT_URI: 'http://testserver/mfa/circadian/callback'
          OURA_CLIENT_ID: ''
          OURA_CLIENT_SECRET: ''
          GOOGLE_FIT_CLIENT_ID: ''
          GOOGLE_FIT_CLIENT_SECRET: ''
        run: |
          cd password_manager
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=html -v --tb=short
      
      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./password_manager/coverage.xml
          flags: backend
          fail_ci_if_error: false


  # ===========================================================================
  # Build Docker Images
  # ===========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [setup, backend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Backend Image
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ needs.setup.outputs.backend_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Backend image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      # Frontend Image
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ needs.setup.outputs.frontend_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_BLOCKCHAIN_ENABLED=${{ secrets.VITE_BLOCKCHAIN_ENABLED }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [setup, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.setup.outputs.backend_image }}:latest
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results (Backend)
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.setup.outputs.frontend_image }}:latest
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results (Frontend)
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build-images]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ vars.STAGING_ENV_NAME || 'staging' }}
      url: https://staging.yourapp.com
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'
      
      - name: Configure kubectl
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "::error::Secret KUBE_CONFIG_STAGING is not set. Cannot deploy."
            exit 1
          fi
          printf '%s' "${KUBE_CONFIG_STAGING}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy to Kubernetes (Staging)
        run: |
          # Update image tags
          kubectl set image deployment/backend \
            backend=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager-staging

          kubectl set image deployment/frontend \
            frontend=${{ needs.setup.outputs.frontend_image }}:${{ github.sha }} \
            -n password-manager-staging

          # Wait for rollout
          kubectl rollout status deployment/backend -n password-manager-staging --timeout=300s
          kubectl rollout status deployment/frontend -n password-manager-staging --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n password-manager-staging
          # Health check
          curl -f https://staging.yourapp.com/api/health/ || exit 1

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build-images, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'production'
      url: https://yourapp.com

    env:
      # Surfaced at job level so `if: env.SLACK_WEBHOOK_URL != ''` can short-circuit
      # the notify steps in forks/repos where the secret isn't configured.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'
      
      - name: Configure kubectl
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "::error::Secret KUBE_CONFIG_PRODUCTION is not set. Cannot deploy."
            exit 1
          fi
          printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          # Sanity check: kubeconfig must contain a server entry
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          # Persist KUBECONFIG for subsequent steps
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Create backup before deployment
        run: |
          # Wait for at least one backend pod to be ready before backup
          kubectl wait pod \
            -l app=password-manager,component=backend \
            -n password-manager \
            --for=condition=Ready \
            --timeout=120s
          
          BACKEND_POD=$(kubectl get pod -n password-manager \
            -l app=password-manager,component=backend \
            -o jsonpath='{.items[0].metadata.name}')
          
          kubectl exec -n password-manager "$BACKEND_POD" -- \
            python manage.py dumpdata \
            --natural-foreign --natural-primary \
            -o /app/backup_$(date +%Y%m%d_%H%M%S).json || echo "Backup failed, continuing"
      
      - name: Run database migrations (one-shot Job)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Replaces the old per-pod `migrate` initContainer (which raced
          # across replicas: 3 backend pods on rollout).
          kubectl delete job backend-migrate -n password-manager --ignore-not-found
          envsubst < k8s/migrate-job.yaml | kubectl apply -n password-manager -f -
          kubectl wait --for=condition=complete job/backend-migrate \
            -n password-manager --timeout=600s

      - name: Deploy to Kubernetes (Production)
        run: |
          # Apply latest manifests
          kubectl apply -f k8s/production/ -n password-manager

          # Update image tags with blue-green deployment
          kubectl set image deployment/backend \
            backend=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/websocket \
            websocket=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/celery-worker \
            celery-worker=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/celery-beat \
            celery-beat=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/frontend \
            frontend=${{ needs.setup.outputs.frontend_image }}:${{ github.sha }} \
            -n password-manager
          
          # Wait for rollout
          kubectl rollout status deployment/backend -n password-manager --timeout=600s
          kubectl rollout status deployment/frontend -n password-manager --timeout=300s
      
      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30
          
          # Health checks
          curl -f https://yourapp.com/api/health/ || exit 1
          curl -f https://yourapp.com/health || exit 1
          
          echo " Smoke tests passed!"
      
      - name: Notify deployment success
        # Skip if no webhook is configured (e.g., forks without secrets).
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deployment successful!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Password Manager Production Deployment*\nDeployment completed successfully\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*URL:* https://yourapp.com"
                  }
                }
              ]
            }

      - name: Notify deployment failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deployment failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Password Manager Production Deployment FAILED*\nPlease check the workflow logs\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"

  # ===========================================================================
  # Rollback (Manual Trigger)
  # ===========================================================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_target == 'production'
    environment:
      name: 'production'
    
    permissions:
      contents: read
    
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'

      - name: Configure kubectl
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "::error::Secret KUBE_CONFIG_PRODUCTION is not set. Cannot rollback."
            exit 1
          fi
          printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Rollback deployments
        run: |
          kubectl rollout undo deployment/backend -n password-manager
          kubectl rollout undo deployment/websocket -n password-manager
          kubectl rollout undo deployment/celery-worker -n password-manager
          kubectl rollout undo deployment/celery-beat -n password-manager
          kubectl rollout undo deployment/frontend -n password-manager

          # Wait for rollback
          kubectl rollout status deployment/backend -n password-manager --timeout=300s
          kubectl rollout status deployment/frontend -n password-manager --timeout=300s

          echo "Rollback completed!"

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"


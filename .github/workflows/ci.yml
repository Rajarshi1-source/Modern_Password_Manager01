# =============================================================================
# GitHub Actions CI/CD Pipeline - Password Manager
# =============================================================================
# Complete CI/CD pipeline for:
# - Testing (Backend + Frontend)
# - Building Docker images
# - Deploying to staging/production
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Least-privilege default token for every job. Jobs that need more (e.g.
# packages: write, security-events: write, id-token: write) declare their own
# `permissions:` block, which overrides this top-level default.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===========================================================================
  # Compute lowercase image names
  # ===========================================================================
  # OCI image references must be lowercase. ${{ github.repository }} preserves
  # the GitHub-stored casing (which can include uppercase letters and `_`),
  # producing references that fail to parse in strict clients like Trivy.
  # This job emits lowercase image names that all downstream jobs consume.
  setup:
    name: Compute image names
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.names.outputs.backend }}
      frontend_image: ${{ steps.names.outputs.frontend }}
    steps:
      - id: names
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repo_lc}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${repo_lc}/frontend" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Backend Tests
  # ===========================================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          # PR #278 review (CodeRabbit): no ``cache: 'pip'`` here —
          # the install step below uses ``pip install --no-cache-dir``
          # to avoid the wheel-cache disk hit (Phase G / G2), so the
          # setup-python pip cache restore/save would be redundant
          # overhead with no read/write benefit.

      - name: Free disk space on runner
        # Phase G / G2 (2026-05): Backend Tests on PR #277 (run #879)
        # failed at pip-install with "OSError: [Errno 28] No space left
        # on device" partway through installing torch / tensorflow /
        # nvidia-cu* / mediapipe / dlib / face-recognition-models —
        # the multi-gigabyte ML dependency tree exceeded the standard
        # Azure runner's 14 GB free-disk budget once apt-cache, pip
        # download-cache, and pre-baked toolchains were factored in.
        #
        # Reclaim disk BEFORE installing so we have headroom. The
        # paths below are all guaranteed-unused by Backend Tests:
        # we don't compile .NET, we don't run Android emulators, we
        # don't need GHC / Swift / Boost. Saves ~25–30 GB on the
        # standard ubuntu-latest runner.
        run: |
          set -eu
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"/Java_* || true
          docker image prune -a -f || true
          df -h /
      - name: Install dependencies
        run: |
          sudo apt-get update
          # enable universe (libgl packages sometimes live there)
          sudo apt-get install -y software-properties-common || true
          sudo add-apt-repository -y universe || true
          sudo apt-get update

          # Required build deps (must be installed)
          sudo apt-get install -y python3-dev build-essential || true

          # Optional system deps: try to install, but don't fail CI if not available
          sudo apt-get install -y libgl1-mesa-glx || echo "libgl1-mesa-glx not available, skipping"
          sudo apt-get install -y liboqs-dev || echo "liboqs-dev not available, skipping"

          # Phase G / G2 (2026-05): reclaim the apt cache after
          # install (~500 MB) so the pip step below has more headroom.
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          cd password_manager
          # Phase G / G2 (2026-05): ``--no-cache-dir`` so pip doesn't
          # keep the downloaded wheels in ~/.cache/pip after extract.
          # Torch + tensorflow + nvidia-cu* wheels alone are ~3-4 GB;
          # cache cleanup after each install lets pip stream-extract
          # instead of accumulating downloads. Combined with the
          # ``Free disk space on runner`` step above, this comfortably
          # fits the full ML dep tree in the runner's disk budget.
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-django pytest-cov flake8 black isort "safety==2.3.5" bandit
          # Show what we actually used vs what's left.
          df -h /
      
      - name: Run linting
        run: |
          cd password_manager
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Check code formatting
        run: |
          cd password_manager
          black --check --diff . || true
          isort --check-only --diff . || true
      
      - name: Security check
        run: |
          cd password_manager
          safety check -r requirements.txt || true
          bandit -r . -x tests,venv --severity-level medium || true
      
      - name: Wait for Postgres and Redis
        run: |
          echo "Export PG env vars and DATABASE_URL..."
          export PGHOST=127.0.0.1
          export PGPORT=5432
          export PGUSER=test_user
          export PGPASSWORD=test_password
          export PGDATABASE=test_db
          export DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
          echo "Waiting for Postgres..."
          for i in {1..60}; do
            if pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" >/dev/null 2>&1; then
              echo "Postgres is ready"; break
            fi
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in {1..60}; do
            if redis-cli -h 127.0.0.1 ping >/dev/null 2>&1; then
              echo "Redis is ready"; break
            fi
            sleep 1
          done
        shell: bash

      - name: Run migrations
        env:
          DEBUG: 'True'
          SECRET_KEY: 'test-secret-key-for-ci'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          REDIS_URL: redis://127.0.0.1:6379/0
          USE_REDIS_CACHE: 'True'
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: test_user
          PGPASSWORD: test_password
          PGDATABASE: test_db
          DATABASE_URL: postgresql://test_user:test_password@127.0.0.1:5432/test_db
        run: |
          cd password_manager
          python manage.py migrate --noinput
      
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: password_manager.settings
          DEBUG: 'True'
          SECRET_KEY: 'test-secret-key-for-ci'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          REDIS_URL: redis://127.0.0.1:6379/0
          USE_REDIS_CACHE: 'True'
          CELERY_BROKER_URL: redis://127.0.0.1:6379/1
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: test_user
          PGPASSWORD: test_password
          PGDATABASE: test_db
          DATABASE_URL: postgresql://test_user:test_password@127.0.0.1:5432/test_db
          # Feature flags: keep enabled so the new apps' URL patterns + tests
          # are exercised in CI.
          CIRCADIAN_TOTP_ENABLED: 'True'
          DECENTRALIZED_IDENTITY_ENABLED: 'True'
          # Security feature flags introduced with the "Smart Contract
          # Automation / Honeypot Passwords / Self-Destructing
          # Passwords" rollout. Kept enabled so their URL patterns and
          # tests run; the on-chain bridge is short-circuited by an
          # empty VAULT_AUDIT_LOG_ADDRESS.
          SMART_CONTRACT_UNLOCK_ONCHAIN_ENABLED: 'True'
          VAULT_AUDIT_LOG_ADDRESS: ''
          HONEYPOT_CREDENTIALS_ENABLED: 'True'
          HONEYPOT_DEFAULT_CHANNELS: 'email'
          SELF_DESTRUCT_PASSWORDS_ENABLED: 'True'
          SELF_DESTRUCT_SWEEP_INTERVAL_MINUTES: '5'
          # Ultrasonic device pairing + Heartbeat/HRV authentication.
          # Kept enabled so URL patterns and backend tests exercise
          # the full code path. The audio/camera capture paths are
          # exercised only in the frontend smoke suite.
          ULTRASONIC_PAIRING_ENABLED: 'True'
          PAIRING_SESSION_TTL_SECONDS: '120'
          HEARTBEAT_AUTH_ENABLED: 'True'
          HEARTBEAT_DURESS_ENABLED: 'True'
          DID_ISSUER_DID: 'did:web:test.securevault.local'
          IPFS_PROVIDER: 'pinata'
          VC_CHAIN_ANCHOR_ENABLED: 'False'
          # Placeholder provider credentials (empty in CI so real network
          # calls are short-circuited by the adapters).
          PINATA_JWT: ''
          WEB3_STORAGE_TOKEN: ''
          ARWEAVE_WALLET_JSON: ''
          FITBIT_CLIENT_ID: ''
          FITBIT_CLIENT_SECRET: ''
          FITBIT_REDIRECT_URI: 'http://testserver/mfa/circadian/callback'
          OURA_CLIENT_ID: ''
          OURA_CLIENT_SECRET: ''
          GOOGLE_FIT_CLIENT_ID: ''
          GOOGLE_FIT_CLIENT_SECRET: ''
        run: |
          cd password_manager
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=html -v --tb=short
      
      - name: Upload coverage report
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v6.0.0
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./password_manager/coverage.xml
          flags: backend
          fail_ci_if_error: false


  # ===========================================================================
  # Build Docker Images
  # ===========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [setup, backend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space on runner
        # The backend image is built for BOTH linux/amd64 and linux/arm64
        # on a single ubuntu-latest runner (arm64 via QEMU). Both platform
        # builds install the full dependency tree concurrently into the
        # buildx container, and the amd64 ML layer alone (torch /
        # tensorflow / mediapipe / dlib / face-recognition-models) is
        # multiple GB. On run #913 the arm64 *core* layer aborted with
        # "OSError: [Errno 28] No space left on device" — the standard
        # runner's ~14 GB free-disk budget was exhausted before the
        # required core deps finished installing.
        #
        # Mirror the reclaim step the backend-test job already uses: drop
        # the pre-baked toolchains this job never touches (.NET, Android,
        # GHC, CodeQL, Boost, bundled JDKs) to recover ~25–30 GB of
        # headroom before buildx runs. These paths are all unused by a
        # Docker image build.
        run: |
          set -eu
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"/Java_* || true
          docker image prune -a -f || true
          df -h /

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Backend Image
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.setup.outputs.backend_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      # Frontend Image
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.setup.outputs.frontend_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_BLOCKCHAIN_ENABLED=${{ secrets.VITE_BLOCKCHAIN_ENABLED }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [setup, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.setup.outputs.backend_image }}:latest
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          # Scope this image scan to OS packages only. Python/library advisories
          # in the bundled venv are covered (without ignore-unfixed) by the
          # filesystem SCA scanners — Grype `dir:.`, Trivy fs, Safety, pip-audit —
          # so they are still surfaced for triage rather than hidden here.
          vuln-type: 'os'
          # Apply the maintained .trivyignore (via trivy.yaml -> ignorefile). Its
          # threat assessments are written against THIS backend Debian image
          # (ncurses/curl/libssh2/sqlite/libgcrypt/...) + the autobahn secret.
          trivy-config: trivy.yaml
          # OS-package CVEs with no upstream Debian fix (e.g. the perl CRITICALs
          # CVE-2026-42496 / CVE-2026-8376) are unactionable — the Dockerfile already
          # runs `apt-get -y upgrade`, so anything fixable is pulled at build time.
          ignore-unfixed: true

      - name: Upload Trivy scan results (Backend)
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.setup.outputs.frontend_image }}:latest
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          # OS packages only (libraries handled by the filesystem SCA scanners).
          vuln-type: 'os'
          # NOTE: deliberately does NOT load trivy.yaml/.trivyignore. The ignore
          # entries are written against the backend's python:3.11-slim-bookworm
          # image (e.g. the curl CVEs are justified by "no curl binary; healthcheck
          # uses urllib"). The frontend is nginx:alpine and DOES install + use curl
          # in its HEALTHCHECK (docker/frontend/Dockerfile), so reusing those
          # backend-only justifications would wrongly hide real frontend curl CVEs.
          ignore-unfixed: true

      - name: Upload Trivy scan results (Frontend)
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build-images]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ vars.STAGING_ENV_NAME || 'staging' }}
      url: https://staging.yourapp.com
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'
      
      - name: Configure kubectl
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "::error::Secret KUBE_CONFIG_STAGING is not set. Cannot deploy."
            exit 1
          fi
          printf '%s' "${KUBE_CONFIG_STAGING}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy to Kubernetes (Staging)
        run: |
          # Update image tags
          kubectl set image deployment/backend \
            backend=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager-staging

          kubectl set image deployment/frontend \
            frontend=${{ needs.setup.outputs.frontend_image }}:${{ github.sha }} \
            -n password-manager-staging

          # Wait for rollout
          kubectl rollout status deployment/backend -n password-manager-staging --timeout=300s
          kubectl rollout status deployment/frontend -n password-manager-staging --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n password-manager-staging
          # Health check
          curl -f https://staging.yourapp.com/api/health/ || exit 1

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build-images, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'production'
      url: https://yourapp.com

    env:
      # Surfaced at job level so `if: env.SLACK_WEBHOOK_URL != ''` can short-circuit
      # the notify steps in forks/repos where the secret isn't configured.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'
      
      - name: Configure kubectl
        id: configure_kubectl
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          # When the production deploy secret isn't configured (e.g.
          # forks, repos that haven't onboarded the GitOps target yet),
          # exit cleanly and signal subsequent steps to skip via the
          # `deploy_enabled` output. Same pattern used by codacy.yml's
          # "Verify Codacy token is set" step. Treating "no secret" as a
          # clean skip keeps the deploy job from blocking the workflow
          # on every push to main while still surfacing the missing-
          # configuration warning in the job log.
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "::warning::Secret KUBE_CONFIG_PRODUCTION is not set — skipping production deploy."
            echo "Set the secret in Settings > Secrets and variables > Actions > KUBE_CONFIG_PRODUCTION to enable."
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          # Sanity check: kubeconfig must contain a server entry
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          # Persist KUBECONFIG for subsequent steps
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"
          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"

      - name: Create backup before deployment
        if: steps.configure_kubectl.outputs.deploy_enabled == 'true'
        run: |
          # Wait for at least one backend pod to be ready before backup
          kubectl wait pod \
            -l app=password-manager,component=backend \
            -n password-manager \
            --for=condition=Ready \
            --timeout=120s

          BACKEND_POD=$(kubectl get pod -n password-manager \
            -l app=password-manager,component=backend \
            -o jsonpath='{.items[0].metadata.name}')

          kubectl exec -n password-manager "$BACKEND_POD" -- \
            python manage.py dumpdata \
            --natural-foreign --natural-primary \
            -o /app/backup_$(date +%Y%m%d_%H%M%S).json || echo "Backup failed, continuing"

      - name: Run database migrations (one-shot Job)
        if: steps.configure_kubectl.outputs.deploy_enabled == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Replaces the old per-pod `migrate` initContainer (which raced
          # across replicas: 3 backend pods on rollout).
          kubectl delete job backend-migrate -n password-manager --ignore-not-found
          envsubst < k8s/migrate-job.yaml | kubectl apply -n password-manager -f -
          kubectl wait --for=condition=complete job/backend-migrate \
            -n password-manager --timeout=600s

      - name: Deploy to Kubernetes (Production)
        if: steps.configure_kubectl.outputs.deploy_enabled == 'true'
        run: |
          set -euo pipefail
          # Apply latest manifests
          kubectl apply -f k8s/production/ -n password-manager

          # Update image tags with blue-green deployment
          kubectl set image deployment/backend \
            backend=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/websocket \
            websocket=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/celery-worker \
            celery-worker=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/celery-beat \
            celery-beat=${{ needs.setup.outputs.backend_image }}:${{ github.sha }} \
            -n password-manager

          kubectl set image deployment/frontend \
            frontend=${{ needs.setup.outputs.frontend_image }}:${{ github.sha }} \
            -n password-manager
          
          # Wait for rollout
          kubectl rollout status deployment/backend -n password-manager --timeout=600s
          kubectl rollout status deployment/frontend -n password-manager --timeout=300s
      
      - name: Run smoke tests
        if: steps.configure_kubectl.outputs.deploy_enabled == 'true'
        run: |
          # Wait for services to be ready
          sleep 30

          # Health checks
          curl -f https://yourapp.com/api/health/ || exit 1
          curl -f https://yourapp.com/health || exit 1

          echo " Smoke tests passed!"

      - name: Notify deployment success
        # Skip if no webhook is configured (e.g., forks without secrets) or
        # if the deploy was skipped because KUBE_CONFIG_PRODUCTION is unset.
        if: success() && env.SLACK_WEBHOOK_URL != '' && steps.configure_kubectl.outputs.deploy_enabled == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deployment successful!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Password Manager Production Deployment*\nDeployment completed successfully\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*URL:* https://yourapp.com"
                  }
                }
              ]
            }

      - name: Notify deployment failure
        # Fire on every failure case EXCEPT the intentional "no secret
        # configured" skip — i.e. `deploy_enabled` is unset (early step
        # failure such as malformed/base64-invalid KUBE_CONFIG_PRODUCTION
        # or the missing-`server:` sanity check) should still notify,
        # since the deploy was attempted and did not succeed.
        # `!= 'false'` matches both 'true' AND '' (unset); only the
        # literal 'false' value (set by the "no secret" branch) skips.
        if: failure() && env.SLACK_WEBHOOK_URL != '' && steps.configure_kubectl.outputs.deploy_enabled != 'false'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deployment failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Password Manager Production Deployment FAILED*\nPlease check the workflow logs\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"

  # ===========================================================================
  # Rollback (Manual Trigger)
  # ===========================================================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_target == 'production'
    environment:
      name: 'production'
    
    permissions:
      contents: read
    
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.29.0'

      - name: Configure kubectl
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "::error::Secret KUBE_CONFIG_PRODUCTION is not set. Cannot rollback."
            exit 1
          fi
          printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          chmod 600 "${RUNNER_TEMP}/kubeconfig"
          if ! grep -q '^[[:space:]]*server:' "${RUNNER_TEMP}/kubeconfig"; then
            echo "::error::Decoded kubeconfig is invalid (no 'server:' entry found)."
            exit 1
          fi
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Rollback deployments
        run: |
          kubectl rollout undo deployment/backend -n password-manager
          kubectl rollout undo deployment/websocket -n password-manager
          kubectl rollout undo deployment/celery-worker -n password-manager
          kubectl rollout undo deployment/celery-beat -n password-manager
          kubectl rollout undo deployment/frontend -n password-manager

          # Wait for rollback
          kubectl rollout status deployment/backend -n password-manager --timeout=300s
          kubectl rollout status deployment/frontend -n password-manager --timeout=300s

          echo "Rollback completed!"

      - name: Cleanup
        if: always()
        run: rm -f "${RUNNER_TEMP}/kubeconfig"


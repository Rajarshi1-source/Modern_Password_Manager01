name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'password_manager/**'
      - 'docker/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'password_manager/**'
      - 'docker/backend/**'

env:
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '15'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===========================================================================
  # LINTING & CODE QUALITY
  # ===========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint bandit "safety==2.3.5"
      
      - name: Run Black (code formatting)
        run: black --check password_manager/
        continue-on-error: true
      
      - name: Run isort (import sorting)
        run: isort --check-only password_manager/
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: flake8 password_manager/ --max-line-length=120 --extend-ignore=E203,W503
        continue-on-error: true
      
      - name: Run Bandit (security checks)
        run: bandit -r password_manager/ -ll
        continue-on-error: true

  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # safety==2.3.5 requires packaging<22; pip-audit>=2.7 requires packaging>=23.
          # Installing both in the same environment is impossible, so use pipx to
          # isolate each tool in its own virtual environment.
          pipx install "safety==2.3.5"
          pipx install pip-audit
      
      - name: Run Safety (dependency vulnerabilities)
        run: safety check --file password_manager/requirements.txt
        continue-on-error: true
      
      - name: Run pip-audit
        run: pip-audit -r password_manager/requirements.txt
        continue-on-error: true

  # ===========================================================================
  # TESTING
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # PR #278 review (CodeRabbit): no ``cache: 'pip'`` here —
          # the install step below uses ``pip install --no-cache-dir``
          # to avoid the wheel-cache disk hit (Phase G / G2), so the
          # setup-python pip cache restore/save would be redundant
          # overhead with no read/write benefit. The other jobs in
          # this workflow (lint) still cache pip because they DO use
          # the cache.

      - name: Free disk space on runner
        # Phase G / G2 (2026-05): mirror the ci.yml fix — Backend
        # Tests can OOM-disk during pip install of torch / tensorflow /
        # nvidia-cu* / mediapipe / dlib. Reclaim ~25-30 GB by deleting
        # toolchains this job doesn't need.
        run: |
          set -eu
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          docker image prune -a -f || true
          df -h /
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev
          # Phase G / G2: reclaim apt cache (~500 MB) for the pip step.
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          # Phase G / G2: ``--no-cache-dir`` keeps pip from retaining
          # the 3-4 GB of downloaded ML wheels (torch + tensorflow +
          # nvidia-cu*) after install. Streams extract instead.
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir -r password_manager/requirements.txt
          pip install --no-cache-dir pytest pytest-django pytest-cov pytest-asyncio
          df -h /
      
      - name: Run Django checks
        working-directory: ./password_manager
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: False
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy
      
      - name: Run migrations
        working-directory: ./password_manager
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: False
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate
      
      - name: Run tests
        working-directory: ./password_manager
        env:
          DJANGO_SETTINGS_MODULE: password_manager.settings
          PYTHONPATH: ${{ github.workspace }}/password_manager
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
        run: pytest --cov=. --cov-report=xml --cov-report=html -x
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.0
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./password_manager/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # ===========================================================================
  # BUILD DOCKER IMAGE
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    permissions:
      contents: read
    
    steps:
      - name: Free disk space on runner
        # The multi-stage backend image pulls heavy ML deps (tensorflow ~572MB,
        # torch ~192MB, dlib compile, opencv) plus a liboqs build stage. The
        # default ubuntu-latest runner has ~14GB free, which is not enough —
        # builds fail with "no space left on device" during the final COPY of
        # /opt/venv. Reclaim ~30GB by removing pre-installed tooling we don't
        # need for this build.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CodeRabbit nit (PR #279): this job only reads the tree and feeds it
          # into buildx — it never runs authenticated git operations — so don't
          # leave GITHUB_TOKEN persisted in .git/config for downstream steps.
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./docker/backend/Dockerfile
          push: false
          tags: password-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

# =============================================================================
# Deployment to production is owned exclusively by ci.yml's `deploy-production`
# job. The previous placeholder `deploy` stanza here also triggered on `push`
# to `main`, which would have run `kubectl set image` against the same
# Deployments concurrently with ci.yml — one job racing the other. Removed.
# =============================================================================

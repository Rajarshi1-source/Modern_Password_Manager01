name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'password_manager/**'
      - 'docker/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'password_manager/**'
      - 'docker/backend/**'

env:
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '15'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===========================================================================
  # LINTING & CODE QUALITY
  # ===========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'password_manager/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint bandit "safety==2.3.5"
      
      - name: Run Black (code formatting)
        run: black --check password_manager/
        continue-on-error: true
      
      - name: Run isort (import sorting)
        run: isort --check-only password_manager/
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: flake8 password_manager/ --max-line-length=120 --extend-ignore=E203,W503
        continue-on-error: true
      
      - name: Run Bandit (security checks)
        run: bandit -r password_manager/ -ll
        continue-on-error: true

  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # safety==2.3.5 requires packaging<22; pip-audit>=2.7 requires packaging>=23.
          # Installing both in the same environment is impossible, so use pipx to
          # isolate each tool in its own virtual environment.
          pipx install "safety==2.3.5"
          pipx install pip-audit
      
      - name: Run Safety (dependency vulnerabilities)
        run: safety check --file password_manager/requirements.txt
        continue-on-error: true
      
      - name: Run pip-audit
        run: pip-audit -r password_manager/requirements.txt
        continue-on-error: true

  # ===========================================================================
  # TESTING
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r password_manager/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-asyncio
      
      - name: Run Django checks
        working-directory: ./password_manager
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: False
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy
      
      - name: Run migrations
        working-directory: ./password_manager
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: False
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate
      
      - name: Run tests
        working-directory: ./password_manager
        env:
          DJANGO_SETTINGS_MODULE: password_manager.settings
          PYTHONPATH: ${{ github.workspace }}/password_manager
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
        run: pytest --cov=. --cov-report=xml --cov-report=html -x
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./password_manager/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # ===========================================================================
  # BUILD DOCKER IMAGE
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      
      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/backend/Dockerfile
          push: false
          tags: password-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

# =============================================================================
# Deployment to production is owned exclusively by ci.yml's `deploy-production`
# job. The previous placeholder `deploy` stanza here also triggered on `push`
# to `main`, which would have run `kubectl set image` against the same
# Deployments concurrently with ci.yml — one job racing the other. Removed.
# =============================================================================

[pytest]
DJANGO_SETTINGS_MODULE = password_manager.settings
pythonpath = .
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:websockets\.legacy
    ignore::UserWarning:torch\.cuda
    ignore::DeprecationWarning:drf_yasg\.views
    ignore:app_settings\.USERNAME_REQUIRED is deprecated.*:UserWarning:dj_rest_auth\.registration\.serializers
    ignore:app_settings\.EMAIL_REQUIRED is deprecated.*:UserWarning:dj_rest_auth\.registration\.serializers
    ignore::DeprecationWarning:google\.cloud\.storage\.blob
markers =
    integration: mark a test as an integration test
    asyncio: mark a test as async

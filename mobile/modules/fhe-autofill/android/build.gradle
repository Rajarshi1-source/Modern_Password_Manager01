apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'expo.modules.fheautofill'
version = '0.1.0'

android {
  namespace "expo.modules.fheautofill"
  compileSdkVersion rootProject.ext.compileSdkVersion ?: 34

  defaultConfig {
    minSdkVersion rootProject.ext.minSdkVersion ?: 26
    targetSdkVersion rootProject.ext.targetSdkVersion ?: 34
    versionCode 1
    versionName "0.1.0"
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${kotlin_version ?: '1.9.10'}"
}

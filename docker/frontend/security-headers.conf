# Security headers — single source of truth for the frontend nginx image.
#
# Included at the server level AND inside every location that defines its own
# add_header. nginx's add_header does NOT inherit into a location that sets any
# add_header of its own, so without re-including these, the SPA's index.html and
# other responses would ship WITHOUT CSP / X-Frame-Options (the cause of Semgrep
# header-redefinition alerts #1001–#1008). Keeping them here means there is one
# place to edit and every response carries them.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# Content-Security-Policy — hardened here:
#   * script-src: 'unsafe-inline' REMOVED. The Vite production build emits only
#     external module scripts (dist/index.html contains zero inline <script>
#     blocks; all chunks are same-origin /assets/*), so inline-script injection —
#     the primary XSS vector — is now blocked by 'self'.
#   * Added base-uri 'self' (blocks <base>-tag injection) and object-src 'none'
#     (blocks <object>/<embed> plugin XSS). This SPA uses neither.
#
# 'unsafe-eval' is RETAINED deliberately — it is required by the bundled WASM
# crypto. Verified against the built chunks: `new Function(...)` is used
# functionally (not as a benign globalThis shim) by
#   * fheService  -> new Function("moduleName","return import(moduleName)")("tfhe")
#                    (dynamic-imports the TFHE FHE WASM module), and
#   * pqc-crypto  -> new Function(<body>) inside the CRYSTALS-Kyber WASM glue.
# 'wasm-unsafe-eval' would NOT cover these (they are JS codegen / dynamic import,
# not WebAssembly compilation), so dropping 'unsafe-eval' would break FHE and
# post-quantum crypto. Removing it requires upstream changes in those libraries
# (or self-hosting patched builds) — tracked separately.
#
# style-src keeps 'unsafe-inline' because styled-components v6 injects runtime
# <style> tags; nonce-ing them needs a per-request nonce wired into the JS bundle
# (StyleSheetManager) — a larger frontend change tracked separately.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

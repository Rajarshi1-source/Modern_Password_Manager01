# Security headers — single source of truth for the frontend nginx image.
#
# Included at the server level AND inside every location that defines its own
# add_header. nginx's add_header does NOT inherit into a location that sets any
# add_header of its own, so without re-including these, the SPA's index.html and
# other responses would ship WITHOUT CSP / X-Frame-Options (the cause of Semgrep
# header-redefinition alerts #1001–#1008). Keeping them here means there is one
# place to edit and every response carries them.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# CSP carried over verbatim from the previous inline server config (this change
# only relocates the headers; it does not loosen them). The 'unsafe-inline' /
# 'unsafe-eval' script-src tokens are a known pre-existing weakness — the Vite/
# React bundle and the WASM crypto (TFHE/Kyber, which needs eval-class APIs)
# currently rely on them. TODO(security): migrate to a nonce-/hash-based CSP
# (per-response nonce injected by the entrypoint config + build) so these tokens
# can be dropped. Tracked as a separate hardening task, not this alert-fix PR.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;

server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — defined once in the included snippet. Because nginx's
    # add_header does NOT inherit into a location that sets its own add_header,
    # the snippet is re-included in every such location below so that CSP /
    # X-Frame-Options are never dropped from a response.
    include /etc/nginx/security-headers.conf;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for HTML
    location ~ \.html$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Health check endpoint
    location /health {
        include /etc/nginx/security-headers.conf;
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Runtime configuration
    location /config.js {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type application/javascript;
    }

    # SPA routing - all routes serve index.html
    location / {
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security - deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
